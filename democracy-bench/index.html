<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Democracy Bench: Measuring Whether AI Models Track Public Values</title>
<meta name="description" content="An evaluation framework for testing whether AI systems used in government reflect the public's democratic values." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    /* civic dark — tuned for a big screen */
    --bg: #0d1117; --panel: #161b22; --panel-2: #1c232d; --ink: #e9eef4; --muted: #9aa7b4; --faint: #687684;
    --line: rgba(255,255,255,0.09); --line-2: rgba(255,255,255,0.16);
    --accent: #f5a623; --accent-soft: rgba(245,166,35,0.16);
    --public: #8b98a6; --gpt: #ef6f5e; --haiku: #9a7cf0; --ds: #3fc6b7;
    --mistral: #5b9bf0; --command: #e879c0; --gemini: #6fbf73;
    --good: #3fb27f; --warn: #f5a623; --bad: #e5534b;
    --disp: "Space Grotesk", system-ui, sans-serif;
    --sans: "IBM Plex Sans", system-ui, sans-serif;
    --mono: "IBM Plex Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 18px; line-height: 1.55; -webkit-font-smoothing: antialiased; }
  a { color: inherit; }
  .container { max-width: 1340px; margin: 0 auto; padding: 0 48px; }
  .display { font-family: var(--disp); font-weight: 600; letter-spacing: -0.02em; }
  .mono { font-family: var(--mono); }
  .tag { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }
  .dot-row { display: inline-flex; align-items: center; gap: 9px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.7); } }
  .dot.live { }

  .nav { position: sticky; top: 0; z-index: 50; background: color-mix(in srgb, var(--bg) 86%, transparent); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 70px; }
  .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .brand-mark { width: 20px; height: 20px; border: 2px solid var(--accent); border-radius: 6px; }
  .brand-name { font-family: var(--disp); font-weight: 600; font-size: 19px; letter-spacing: -0.02em; }
  .nav-links { display: flex; align-items: center; gap: 28px; }
  .nav-links a { font-size: 15px; color: var(--muted); text-decoration: none; }
  .nav-links a:hover { color: var(--ink); }

  .hero { padding: 56px 0 64px; }
  .hero-card { background: linear-gradient(160deg, #11161d, #0c1014); border: 1px solid var(--line); border-radius: 20px; overflow: hidden; display: grid; grid-template-columns: 1.02fr 0.98fr; }
  .hero-body { padding: 56px 52px 50px; }
  .hero-eyebrow { color: var(--accent); margin-bottom: 22px; }
  h1.hero-title { font-family: var(--disp); font-weight: 600; letter-spacing: -0.025em; font-size: clamp(34px, 3.6vw, 56px); line-height: 1.04; margin: 0 0 22px; text-wrap: balance; }
  .hero-blurb { font-size: 19px; line-height: 1.6; color: var(--muted); margin: 0 0 30px; max-width: 30em; }
  .hero-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; border-top: 1px solid var(--line); padding-top: 24px; }
  .hstat-num { font-family: var(--disp); font-weight: 600; font-size: 26px; color: var(--accent); letter-spacing: -0.02em; }
  .hstat-lab { font-size: 11.5px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--faint); margin-top: 4px; }
  .hero-vis { background: #0a0d11; border-left: 1px solid var(--line); display: flex; align-items: center; padding: 38px; }

  .widget { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 22px 24px; width: 100%; }
  .widget.raised { box-shadow: 0 18px 50px rgba(0,0,0,0.45); }
  .widget-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .widget-head .tag { color: var(--muted); }
  .w-q { font-family: var(--disp); font-weight: 500; font-size: 19px; line-height: 1.3; min-height: 50px; margin-bottom: 18px; }
  .bargroup { display: flex; align-items: flex-end; gap: 14px; height: 132px; }
  .bg-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; gap: 7px; }
  .bg-stack { display: flex; align-items: flex-end; gap: 3px; height: 100%; width: 100%; justify-content: center; }
  .bg-bar { flex: 1; max-width: 16px; border-radius: 3px 3px 0 0; transition: height .6s cubic-bezier(.22,.61,.36,1), background .3s; min-height: 2px; }
  .bg-lab { font-family: var(--mono); font-size: 12px; color: var(--faint); white-space: nowrap; }
  .axis { display: flex; gap: 14px; margin-top: 9px; border-top: 1px solid var(--line); padding-top: 10px; }
  .axcell { flex: 1; text-align: center; font-family: var(--mono); font-size: 10.5px; color: var(--faint); letter-spacing: 0.02em; line-height: 1.3; }
  .widget-foot { display: flex; align-items: flex-end; justify-content: space-between; border-top: 1px solid var(--line); padding-top: 14px; margin-top: 14px; }
  .widget-num { font-family: var(--disp); font-weight: 600; font-size: 32px; letter-spacing: -0.03em; line-height: 1; }
  .widget-num span { font-size: 14px; color: var(--muted); font-weight: 400; }
  .dots { display: flex; gap: 7px; }
  .pdot { width: 8px; height: 8px; border-radius: 50%; background: var(--line-2); transition: background .3s, transform .3s; cursor: pointer; }
  .pdot.on { background: var(--accent); transform: scale(1.35); }

  .states { display: flex; gap: 8px; margin-bottom: 18px; }
  .state { flex: 1; font-family: var(--mono); font-size: 12px; letter-spacing: 0.02em; color: var(--muted); border: 1px solid var(--line-2); border-radius: 8px; padding: 9px 10px; text-align: center; transition: all .25s; }
  .meter { height: 13px; background: rgba(255,255,255,0.07); border-radius: 7px; overflow: hidden; margin: 6px 0; }
  .meter-fill { height: 100%; border-radius: 7px; transition: width .55s cubic-bezier(.22,.61,.36,1), background .3s; }
  .meter-scale { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10.5px; color: var(--faint); margin-bottom: 14px; }

  .section { padding: 94px 0; border-top: 1px solid var(--line); }
  .sec-eyebrow { color: var(--accent); margin-bottom: 14px; }
  .sec-title { font-family: var(--disp); font-weight: 600; letter-spacing: -0.03em; font-size: clamp(26px, 2.4vw, 36px); line-height: 1.1; margin: 0 0 18px; max-width: 16em; }
  .sec-body { font-size: 18.5px; line-height: 1.62; color: var(--muted); max-width: 34em; }
  .sec-body b { color: var(--ink); font-weight: 600; }
  .sec-body p { margin: 0 0 14px; }
  .sec-grid { display: grid; grid-template-columns: 1fr 0.92fr; gap: 48px; align-items: center; }
  .sec-grid.flip .sg-text { order: 2; }
  @media (max-width: 900px) { .hero-card, .sec-grid, .sec-grid.flip { grid-template-columns: 1fr; } .hero-vis { border-left: none; border-top: 1px solid var(--line); } .sec-grid.flip .sg-text { order: 0; } .container { padding: 0 24px; } }

  .pillrow { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 22px; }
  .pill { font-family: var(--mono); font-size: 13px; color: var(--muted); border: 1px solid var(--line-2); border-radius: 8px; padding: 7px 13px; }
  .pill b { color: var(--ink); }
  .take { margin-top: 24px; font-size: 18px; line-height: 1.5; color: var(--ink); border-left: 3px solid var(--accent); padding-left: 18px; max-width: 30em; }
  .cards { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; margin-top: 8px; }
  .minicard { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 18px 20px; }
  .minicard h4 { font-family: var(--disp); font-size: 16px; margin: 0 0 7px; color: var(--ink); }
  .minicard p { font-size: 14.5px; color: var(--muted); margin: 0; line-height: 1.5; }
  .banner { background: var(--accent-soft); border: 1px solid color-mix(in srgb, var(--accent) 40%, var(--line)); border-radius: 10px; padding: 11px 16px; font-size: 13.5px; color: var(--accent); margin: 22px 0 0; }
  /* interactive explorer */
  .explorer { background: #0a0d11; border: 1px solid var(--line-2); border-radius: 16px; padding: 24px 26px 28px; box-shadow: 0 18px 50px rgba(0,0,0,0.4); }
  .exp-tabs { display: flex; flex-wrap: wrap; gap: 9px; margin-bottom: 24px; }
  .exp-tab { font-family: var(--mono); font-size: 14.5px; color: var(--muted); background: transparent; border: 1px solid var(--line-2); border-radius: 9px; padding: 11px 17px; cursor: pointer; transition: color .15s, background .15s, border-color .15s; }
  .exp-tab:hover { color: var(--ink); border-color: var(--faint); }
  .exp-tab.on { color: #0d1117; background: var(--accent); border-color: var(--accent); font-weight: 500; }
  .exp-head { display: flex; justify-content: space-between; align-items: baseline; gap: 18px; margin-bottom: 22px; flex-wrap: wrap; }
  .exp-q { font-family: var(--disp); font-weight: 500; font-size: clamp(19px, 2vw, 26px); color: var(--ink); }
  .exp-leg { font-family: var(--mono); font-size: 12px; color: var(--faint); white-space: nowrap; }
  .exp-sw { display: inline-block; width: 10px; height: 10px; border-radius: 3px; vertical-align: middle; margin-right: 6px; }
  .exp-chart { display: flex; gap: 16px; align-items: flex-end; height: 250px; }
  .exp-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; }
  .exp-flags { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; align-items: flex-end; min-height: 60px; margin-bottom: 8px; }
  .exp-flag { font-size: 16px; line-height: 1; width: 27px; height: 27px; border-radius: 7px; display: grid; place-items: center; }
  .exp-pct { font-family: var(--mono); font-size: 14px; color: var(--muted); margin-bottom: 5px; }
  .exp-track { width: 58%; height: 120px; display: flex; align-items: flex-end; }
  .exp-fill { width: 100%; background: var(--public); border-radius: 5px 5px 0 0; transition: height .55s cubic-bezier(.22,.61,.36,1); }
  .exp-col.peak .exp-fill { background: var(--accent); }
  .exp-lab { font-family: var(--mono); font-size: 11.5px; color: var(--faint); margin-top: 9px; text-align: center; line-height: 1.3; }
  .exp-headline { font-family: var(--disp); font-weight: 500; font-size: clamp(18px, 1.9vw, 23px); line-height: 1.3; color: var(--ink); margin-top: 26px; border-top: 1px solid var(--line); padding-top: 22px; }
  .exp-quote { display: flex; align-items: center; gap: 13px; margin-top: 14px; max-width: 62em; }
  .exp-qtext { font-size: 15px; color: var(--muted); font-style: italic; }
  .exp-qtext span { font-style: normal; font-family: var(--mono); font-size: 13.5px; }
  .exp-play { flex: 0 0 auto; width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--line-2); background: transparent; color: var(--accent); font-size: 11px; cursor: pointer; transition: background .15s; }
  .exp-play:hover { background: var(--accent-soft); }
  .exp-flag.star { box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent); transform: scale(1.08); }
  @media (max-width: 640px) { .exp-chart { height: 210px; gap: 8px; } .exp-flag { width: 22px; height: 22px; font-size: 14px; } }
  /* quotes */
  .qcard { max-width: 760px; }
  .qbig { font-family: var(--disp); font-weight: 500; font-size: clamp(20px, 2.4vw, 31px); line-height: 1.32; margin: 6px 0 22px; color: var(--ink); }
  .qattr { font-size: 16px; color: var(--muted); }
  .qattr b { color: var(--ink); font-weight: 500; }
  .qattr .qpub { color: var(--accent); }
  /* divergence table */
  .dtwrap { width: 100%; overflow-x: auto; margin-top: 8px; }
  .dtable { width: 100%; border-collapse: collapse; font-size: 15px; }
  .dtable th, .dtable td { padding: 13px 14px; text-align: left; border-bottom: 1px solid var(--line); white-space: nowrap; }
  .dtable th { font-family: var(--mono); font-size: 12px; font-weight: 400; color: var(--faint); letter-spacing: 0.02em; }
  .dt-name { font-family: var(--mono); font-size: 13.5px; }
  .dt-pub { border-bottom: 2px solid var(--line-2); }
  .dt-pub .dt-cell { color: var(--accent); font-weight: 500; }
  .dt-cell { color: var(--muted); }
  .dt-cell.diff { color: #ffc7c2; background: rgba(229,83,75,0.14); font-weight: 500; }
  .dt-foot { font-family: var(--mono); font-size: 12px; color: var(--faint); margin-top: 14px; }
  /* leaderboard */
  .lb-row { display: flex; align-items: center; gap: 14px; padding: 8px 8px; border-radius: 8px; transition: background .3s; }
  .lb-row.spot { background: rgba(255,255,255,0.05); }
  .lb-who { flex: 0 0 172px; font-family: var(--mono); font-size: 13.5px; }
  .lb-track { flex: 1; height: 18px; background: rgba(255,255,255,0.06); border-radius: 6px; overflow: hidden; }
  .lb-fill { height: 100%; border-radius: 6px; transition: width .8s cubic-bezier(.22,.61,.36,1); }
  .lb-val { flex: 0 0 44px; text-align: right; font-family: var(--mono); font-size: 15px; font-weight: 500; }
  /* horizontal survey bars */
  .hbars { display: flex; flex-direction: column; gap: 12px; }
  .hbar-row { display: flex; align-items: center; gap: 14px; }
  .hbar-lab { flex: 0 0 230px; font-size: 14.5px; color: var(--ink); }
  .hbar-track { flex: 1; height: 22px; background: rgba(255,255,255,0.06); border-radius: 6px; overflow: hidden; }
  .hbar-fill { height: 100%; border-radius: 6px; transition: width .7s cubic-bezier(.22,.61,.36,1); }
  .hbar-pct { flex: 0 0 46px; text-align: right; font-family: var(--mono); font-size: 15px; font-weight: 500; }
  /* actual-answer rows */
  .ans-row { display: flex; align-items: center; gap: 14px; padding: 10px 0; border-bottom: 1px solid var(--line); }
  .ans-who { flex: 0 0 156px; font-family: var(--mono); font-size: 13px; color: var(--muted); }
  .ans-pill { flex: 1; font-size: 15.5px; padding: 9px 13px; border-radius: 9px; background: rgba(255,255,255,0.05); border: 1px solid var(--line-2); }
  .ans-row.pub .ans-pill { border-color: var(--accent); background: var(--accent-soft); color: var(--ink); font-weight: 500; }
  .ans-pill.div { border-color: var(--bad); background: rgba(229,83,75,0.12); color: #ffc4bf; }
  .ans-pct { flex: 0 0 48px; text-align: right; font-family: var(--mono); font-size: 15px; color: var(--faint); }
  .ans-src { font-family: var(--mono); font-size: 11.5px; color: var(--faint); margin: 4px 0 12px 170px; }
  .div-tag { font-family: var(--mono); font-size: 11px; color: var(--bad); letter-spacing: 0.03em; }
  @media (max-width: 600px) { .hbar-lab { flex-basis: 120px; } .ans-who { flex-basis: 96px; } .ans-src { margin-left: 0; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .closer { padding: 96px 0 104px; border-top: 1px solid var(--line); background: radial-gradient(120% 90% at 15% 0%, rgba(245,166,35,0.07), transparent 60%); }
  .closer .sec-title { font-size: clamp(32px, 4vw, 60px); max-width: 15em; }
  .decide { margin: 46px 0 6px; font-family: var(--disp); font-weight: 500; font-size: clamp(21px, 2.7vw, 40px); line-height: 1.32; color: var(--muted); display: flex; align-items: baseline; flex-wrap: wrap; gap: 8px 14px; max-width: 24em; }
  .decide .cyc { color: var(--accent); animation: fadeUp .5s ease; }
  .decide .ddot { width: 12px; height: 12px; align-self: center; }
  .closer-sub { font-family: var(--mono); font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--faint); margin-top: 14px; }
  .final-statement { margin-top: 56px; font-family: var(--disp); font-weight: 600; font-size: clamp(26px, 3.2vw, 50px); line-height: 1.12; color: var(--ink); border-left: 4px solid var(--accent); padding-left: 28px; max-width: 17em; letter-spacing: -0.025em; }
  section[id] { scroll-margin-top: 84px; }
  /* chapter / tab layout */
  .cnav { position: sticky; top: 0; z-index: 50; background: color-mix(in srgb, var(--bg) 88%, transparent); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); }
  .cnav-inner { display: flex; align-items: center; gap: 20px 28px; min-height: 70px; padding: 8px 0; flex-wrap: wrap; }
  .cnav-tabs { display: flex; gap: 2px; flex-wrap: wrap; }
  .cnav-tab { display: inline-flex; align-items: center; gap: 8px; font-family: var(--sans); font-size: 14.5px; color: var(--muted); background: transparent; border: none; border-bottom: 2px solid transparent; padding: 9px 14px; cursor: pointer; transition: color .15s; }
  .cnav-tab:hover { color: var(--ink); }
  .cnav-tab.on { color: var(--ink); border-bottom-color: var(--accent); }
  .cnav-num { font-family: var(--mono); font-size: 11px; color: var(--faint); }
  .cnav-tab.on .cnav-num { color: var(--accent); }
  .chapter { min-height: calc(100vh - 71px); padding: 60px 0 84px; }
  .ch-wrap { width: 100%; }
  .ch-title { font-family: var(--disp); font-weight: 600; letter-spacing: -0.03em; font-size: clamp(31px, 4.3vw, 56px); line-height: 1.07; margin: 20px 0 28px; max-width: 18em; text-wrap: balance; }
  .ch-lede { font-size: clamp(17px, 1.7vw, 21px); line-height: 1.55; color: var(--muted); max-width: 44em; }
  .ch-lede p { margin: 0 0 16px; } .ch-lede b { color: var(--ink); font-weight: 600; }
  .ch-by { font-size: 13.5px; color: var(--faint); margin: 10px 0 0; }
  .ch-by a { color: var(--accent); text-decoration: none; }
  .ch-by a:hover { text-decoration: underline; }
  .ch-points { display: flex; flex-direction: column; gap: 18px; margin-top: 40px; max-width: 42em; }
  .ch-point { display: flex; gap: 18px; align-items: baseline; }
  .ch-pnum { font-family: var(--mono); font-size: 13px; color: var(--accent); flex: 0 0 auto; }
  .ch-point p { font-size: clamp(16px,1.6vw,19px); color: var(--ink); margin: 0; }
  .ch-cards3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 18px; margin-top: 40px; }
  .ch-card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 24px; }
  .ch-cnum { font-family: var(--mono); font-size: 12.5px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 13px; }
  .ch-card p { font-size: 15.5px; color: var(--muted); margin: 0; line-height: 1.55; }
  .ex-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-top: 40px; }
  .ex-card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 22px 20px; }
  .ex-icon { color: var(--accent); margin-bottom: 14px; }
  .ex-q { font-family: var(--disp); font-weight: 500; font-size: 17px; color: var(--ink); line-height: 1.25; margin-bottom: 11px; }
  .ex-tag { font-family: var(--mono); font-size: 11.5px; color: var(--faint); text-transform: uppercase; letter-spacing: 0.05em; }
  .ex-note { font-size: 16px; color: var(--muted); margin-top: 24px; max-width: 46em; line-height: 1.55; }
  .ch-two { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 36px; }
  .qpanel { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 24px 26px; }
  .qpanel-h { font-family: var(--disp); font-weight: 600; font-size: 19px; color: var(--ink); }
  .qpanel-s { font-family: var(--mono); font-size: 12.5px; color: var(--faint); margin: 6px 0 14px; }
  .qlist { list-style: none; margin: 0; padding: 0; }
  .qlist li { font-size: 16px; color: var(--muted); padding: 11px 0 11px 22px; border-bottom: 1px solid var(--line); position: relative; line-height: 1.4; }
  .qlist li:last-child { border-bottom: none; padding-bottom: 0; }
  .qlist li::before { content: '›'; position: absolute; left: 3px; color: var(--accent); }
  .qlist.floor li::before { content: '▪'; font-size: 10px; top: 15px; color: var(--bad); }
  @media (max-width: 820px) { .ch-two { grid-template-columns: 1fr; } }
  /* ch4: the same flip across three flagship models */
  .mstrip { margin-top: 30px; max-width: 780px; }
  .mstrip-h { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; }
  .mstrip-cap { font-family: var(--mono); font-size: 12px; color: var(--faint); text-transform: uppercase; letter-spacing: 0.06em; }
  .mstrip-leg { display: flex; gap: 16px; font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .mleg::before { content: ''; display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 6px; vertical-align: middle; }

}

// ── matched pair: the same decision, AI actor vs human actor ──
function ReflexMatch(){
  const [ref,vis]=useVisible();
  const [i,setI]=useCycle(MATCH.length, 8000, vis);
  const [phase,setPhase]=useState(0);
  useEffect(()=>{ setPhase(0); if(!vis) return; const t=setTimeout(()=>setPhase(1),3200); return ()=>clearTimeout(t); },[i,vis]);
  const c=MATCH[i], m=MATCH_MODELS[c.model];
  const val=phase===0?c.ai:c.human;
  const col=val>=0.66?'var(--good)':val>=0.33?'var(--warn)':'var(--bad)';
  const swing=+(c.ai-c.human).toFixed(2);
  return (
    <div className="widget raised" ref={ref}>
      <div className="widget-head">
        <span className="mono tag dot-row"><span className="dot live"></span>live · same decision, who decides?</span>
        <span className="mono tag" style={{color:m.color}}>{m.flag} {m.name}</span>
      </div>
      <div className="w-q">{c.decision}</div>
      <div className="states">
        <span className="state" style={phase===0?{background:'var(--accent)',borderColor:'var(--accent)',color:'#0d1117'}:{}}>an AI does it</span>
        <span className="state" style={phase===1?{background:col,borderColor:col,color:'#0d1117'}:{}}>a person does it</span>
      </div>
      <div className="meter"><div className="meter-fill" style={{width:`${val*100}%`,background:col}} /></div>
      <div className="meter-scale"><span>waved through</span><span>blocked</span></div>
      <div className="widget-foot">
        <div><div className="widget-num" style={{color:col}}>{val.toFixed(2)}</div><div className="mono tag" style={{color:'var(--faint)',marginTop:4}}>how hard it objects</div></div>
        <div style={{textAlign:'right'}}><div className="widget-num" style={{fontSize:24,color:'var(--bad)'}}>+{swing.toFixed(2)}</div><div className="mono tag" style={{color:'var(--faint)',marginTop:4}}>from the actor alone</div></div>
      </div>
      <div className="dots" style={{marginTop:14,justifyContent:'center'}}>{MATCH.map((_,j)=><span key={j} className={`pdot ${j===i?'on':''}`} onClick={()=>setI(j)} />)}</div>
      <div className="mono" style={{fontSize:11,color:'var(--faint)',marginTop:13,textAlign:'center'}}>matched pair · 100 samples · 3 flagship models</div>
    </div>
  );
}

    <FixStrip />
    <div className="vd-foot" style={{marginTop:30}}>The fixes barely move anything, and several make it worse — feeding DeepSeek the public's own answers cost it 15 points. You can't instruct a public's values in from the outside. The model has to be changed on the inside — which is the whole case for sovereign AI.</div>
  </div>);
}

function ChWhy(){
  return (<div className="container ch-wrap">
    <div className="mono tag sec-eyebrow">Why it matters</div>
    <h1 className="ch-title" style={{maxWidth:'15em'}}>You cannot ask the public to trust what no one can see.</h1>
    <div className="decide" style={{marginTop:36}}><span className="dot ddot" style={{background:'var(--accent)'}}></span><span>Right now, AI could be deciding</span> <DecisionCycler /></div>
    <div className="final-statement" style={{marginTop:50}}>Sovereign AI is not just owning the model. It is proving it serves the public.</div>
  </div>);
}

function App(){
  const [tab,setTab]=useState(0);
  useEffect(()=>{
    const onKey=(e)=>{
      const d=(e.key==='ArrowRight'||e.key==='ArrowDown')?1:(e.key==='ArrowLeft'||e.key==='ArrowUp')?-1:0;
      if(!d) return;
      const t=e.target; if(t && /^(INPUT|TEXTAREA|SELECT)$/.test(t.tagName)) return;
      e.preventDefault();
      setTab(x=>Math.min(CHAPTERS.length-1, Math.max(0, x+d)));
      window.scrollTo(0,0);
    };
    window.addEventListener('keydown', onKey);
    return ()=>window.removeEventListener('keydown', onKey);
  },[]);
  const CH=[ChProblem,ChMethod,ChVerdict,ChReflex,ChFix,ChWhy][tab];
  return (<React.Fragment>
    <header className="cnav"><div className="container cnav-inner">
      <a className="brand" href="#top" onClick={(ev)=>{ ev.preventDefault(); setTab(0); window.scrollTo(0,0); }}><span className="brand-mark"></span><span className="brand-name">Democracy Bench</span></a>
      <nav className="cnav-tabs">{CHAPTERS.map((c,i)=><button key={i} className={`cnav-tab ${i===tab?'on':''}`} onClick={()=>{ setTab(i); window.scrollTo(0,0); }}><span className="cnav-num">{i+1}</span>{c}</button>)}</nav>
    </div></header>
    <main className="chapter"><CH /></main>
    <footer className="ch-foot"><div className="container" style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:'8px 24px',padding:'22px 48px'}}>
      <span className="mono" style={{fontSize:12.5,color:'var(--muted)'}}>Alejandro Beltran · The Alan Turing Institute · <a href="mailto:abeltran@turing.ac.uk" style={{color:'var(--accent)',textDecoration:'none'}}>abeltran@turing.ac.uk</a></span>
      <span className="mono" style={{fontSize:12.5,color:'var(--faint)'}}>BSA / SSA microdata (NatCen) · 6 models, option-order debiased · replays a real run</span>
    </div></footer>
    <div className="keyhint">Use <b>←</b> <b>→</b> to move between chapters</div>
  </React.Fragment>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body></html>
